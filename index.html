// 주문 이력 집계 (셀 단위): #1 개인화 정렬용 H_byMemberId, #2 셀원 선호 메뉴용 H_topName
let HIST_ROOM="", H_byMemberId={}, H_topName={};
async function loadHist(){
  if(!SHARED){ H_byMemberId={}; H_topName={}; HIST_ROOM=ROOM; return; }
  if(HIST_ROOM===ROOM) return;
  try{
    // 오늘(KST) 주문은 제외 — 마감 후 익일이 되면 그날 주문이 +1로 반영됨(찍기만 해선 안 오름)
    // room_id를 아는 사람만 읽는 RPC. 실패 시 직접 SELECT로 우회하지 않는다.
    const { data, error } = await Sync.client.rpc("get_room_history",{p_room:ROOM,p_today:todayKey()});
    if(error) throw error;
    const byId={}, byName={};
    (data||[]).forEach(r=>{ const mid=r.member_id; if(!mid) return;
      if(r.menu_id){ byId[mid]=byId[mid]||{}; byId[mid][r.menu_id]=(byId[mid][r.menu_id]||0)+1; }
      const nm=r.menu_name||r.menu_id; if(nm){ byName[mid]=byName[mid]||{}; byName[mid][nm]=(byName[mid][nm]||0)+1; }
    });
    H_byMemberId=byId; H_topName={};
    Object.keys(byName).forEach(mid=>{ let top=null,c=-1; const o=byName[mid]; for(const k in o){ if(o[k]>c){c=o[k];top=k;} } H_topName[mid]={name:top,count:c}; });
    HIST_ROOM=ROOM;
  }catch(e){ console.warn("hist fail",e); }
}
// #1: 내가 자주 주문한 메뉴 먼저(빈도 desc) → popular → 상위 10. 이력 없으면 popular 폴백
function popularMenus(){
  const freq=(ME && H_byMemberId[ME]) || {};
  return MENUS.map(m=>({m, f:freq[m.id]||0, p:m.popular?1:0}))
    .filter(x=> x.f>0 || x.p)
    .sort((a,b)=> b.f-a.f || b.p-a.p).slice(0,10).map(x=>x.m);
}
function gridTilesHtml(selId){
  let items = popularMenus();
  const sel = selId && menuById(selId);
  if(sel && !sel.popular) items = [sel, ...items];

  return items.map(m=>tileHtml(m,selId)).join("")
    + customMenusFromOrders().map(m=>tileHtml(m,selId)).join("") + addTile;
}

function todayKey(){ return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Seoul",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date()); }
function prettyDate(){ const o={}; new Intl.DateTimeFormat("ko-KR",{timeZone:"Asia/Seoul",month:"numeric",day:"numeric",weekday:"short"}).formatToParts(new Date()).forEach(p=>o[p.type]=p.value); return `${o.month}월 ${o.day}일 (${o.weekday})`; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// 공유 설정 (CONFIG 또는 localStorage 우선)
const sbUrl = localStorage.getItem("sb_url") || CONFIG.SUPABASE_URL;
const sbKey = localStorage.getItem("sb_key") || CONFIG.SUPABASE_ANON_KEY;

let onChange = ()=>{};

const emptySession = ()=>({ state:"idle", hostId:null, closeAt:null, cafeId:null });

// 동기화 신선도(실시간 대신 폴링이라 '언제 갱신됐는지' 표시 + 수동 새로고침)
let lastSyncAt=0;
function syncAgoText(){ if(!lastSyncAt) return "연결 중"; const s=Math.floor((Date.now()-lastSyncAt)/1000); if(s<5) return "방금"; if(s<60) return s+"초 전"; return Math.floor(s/60)+"분 전"; }
setInterval(()=>{ try{ const el=document.getElementById("syncAgo"); if(el) el.textContent=syncAgoText(); }catch(e){} }, 10000);

/* ---- 단독(로컬) 모드 ---- */
const LocalSync = () => {
  const key = ()=> `coffee_local_${ROOM}_${todayKey()}`;
  function read(){ try{ const r=localStorage.getItem(key()); if(r) return JSON.parse(r);}catch(e){} return {session:emptySession(),orders:{}}; }
  function write(d){ localStorage.setItem(key(), JSON.stringify(d)); apply(d); }
  function apply(d){ SESSION=d.session; ORDERS=d.orders; applyCafeGlobals(); }
  return {
    shared:false,
    async init(cb){ onChange=cb;
      window.addEventListener("storage", e=>{ if(e.key===key()){ apply(read()); onChange(); }}); },
    async reload(){ apply(read()); },
    async resubscribe(){ apply(read()); },
    pause(){},
    async claim(me,cafeId){ const d=read(); if(d.session.state!=="idle") { apply(d); return false; } d.session={state:"open",hostId:me,closeAt:null,cafeId:cafeId||null}; write(d); return true; },
    async unclaim(){ const d=read(); d.session=emptySession(); write(d); }, // 주문은 보존
    async close(){ const d=read(); d.session.state="closed"; write(d); },
    async reopen(){ const d=read(); d.session.state="open"; write(d); },
    async setOrder(me,o){ const d=read(); d.orders[me]=o; write(d); },
    async removeOrder(me){ const d=read(); delete d.orders[me]; write(d); },
  };
};

/* ---- Supabase(공유) 모드 ---- */
const SupabaseSync = () => {
  const client = window.supabase.createClient(sbUrl, sbKey);
  const date = ()=> todayKey();
  function nowIso(){ return new Date().toISOString(); }
  // 엄격 모드: anon 직접 SELECT 차단 → 폴링으로 갱신(실시간 미사용)
  let pollTimer=null;
  function startPolling(){ stopPolling(); pollTimer=setInterval(async()=>{ if(document.hidden) return; try{ await reload(); onChange(); }catch(e){} }, 12000); }
  function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
  function applyRoomData(s, os){
    SESSION = s ? { state:s.state, hostId:s.host_id, closeAt:s.close_at, cafeId:s.cafe_id||null } : emptySession();
    ORDERS = {};
    (os||[]).forEach(r=>{ ORDERS[r.member_id] = { type:r.type, menuId:r.menu_id, menuName:r.menu_name||"", temp:r.temp, extras:r.extras||[], note:r.note||"" }; });
    applyCafeGlobals();
  }
  async function reload(){
    // room_id를 아는 사람만 읽는 RPC(열거 불가). 실패 시 직접 SELECT로 우회하지 않는다.
    const { data, error } = await client.rpc("get_room_day",{p_room:ROOM,p_date:date()});
    if(error) throw error;
    applyRoomData((data&&data.session)||null, (data&&data.orders)||[]);
    lastSyncAt=Date.now();
  }
  return {
    shared:true, client,
    async init(cb){ onChange=cb; },           // 첫 reload/폴링은 enterCell에서
    reload,
    async resubscribe(){ await reload(); startPolling(); },
    pause(){ stopPolling(); },
    async claim(me,cafeId){
      // 경쟁 안전 클레임 — definer RPC(반환=성공여부)
      const { data, error } = await client.rpc("claim_host",{p_room:ROOM,p_date:date(),p_me:me,p_cafe:cafeId||null});
      if(error) throw error;
      await reload();
      return !!data;
    },
    async unclaim(){ // 주문은 보존 — 다른 분이 다시 섬기기로 하면 그대로 유지
      const {error}=await client.rpc("set_room_state",{p_room:ROOM,p_date:date(),p_state:"idle"}); if(error) throw error;
      await reload();
    },
    async close(){ const {error}=await client.rpc("set_room_state",{p_room:ROOM,p_date:date(),p_state:"closed"}); if(error) throw error; await reload(); },
    async reopen(){ const {error}=await client.rpc("set_room_state",{p_room:ROOM,p_date:date(),p_state:"open"}); if(error) throw error; await reload(); },
    async setOrder(me,o){
      const {error}=await client.rpc("set_order",{p_room:ROOM,p_date:date(),p_member_id:me,p_type:o.type,p_menu_id:o.menuId||null,p_menu_name:o.menuName||null,p_temp:o.temp||null,p_extras:o.extras||[],p_note:o.note||""}); if(error) throw error;
      await reload();
    },
    async removeOrder(me){ const {error}=await client.rpc("remove_order",{p_room:ROOM,p_date:date(),p_member_id:me}); if(error) throw error; await reload(); },
  };
};

// 커스텀 확인창 — 기본 confirm() 대체. 뒤로가기 모델과 통합(뒤로가기=취소). 시트 위에도 안전(상위 레이어).
let confirmOpen=false, ignorePop=false, confirmResolve=null;
function askConfirm(message, opts){ opts=opts||{};
  return new Promise(resolve=>{
    confirmResolve=resolve;
    $cscrim.innerHTML=`<div class="cdialog" role="alertdialog" aria-modal="true" aria-label="확인">
      <div class="cmsg">${esc(message)}</div>
      <div class="crow">
        <button class="btn btn-soft" id="cCancel">${esc(opts.cancel||"취소")}</button>
        <button class="btn ${opts.danger?'btn-danger':'btn-brand'}" id="cOk">${esc(opts.ok||"확인")}</button>
      </div></div>`;
    $cscrim.classList.add("show"); confirmOpen=true;
    try{ history.pushState({c:1},""); }catch(e){}
    document.getElementById("cOk").onclick=()=>finishConfirm(true);
    document.getElementById("cCancel").onclick=()=>finishConfirm(false);
  });
}
function finishConfirm(result){ // 버튼으로 닫기: 히스토리 항목 소비(ignorePop)
  if(!confirmOpen) return; confirmOpen=false; $cscrim.classList.remove("show");
  const r=confirmResolve; confirmResolve=null;
  ignorePop=true; try{ history.back(); }catch(e){ ignorePop=false; }
  if(r) r(result);
}
$cscrim.addEventListener("click",e=>{ if(e.target===$cscrim) finishConfirm(false); });
let toastT;
function toast(m){ $toast.textContent=m; $toast.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>$toast.classList.remove("show"),1700); }
// 쓰기 작업 안전 래퍼: 실패 시 토스트, 성공 여부 반환
async function safeWrite(p, failMsg){ try{ await p; return true; }catch(e){ console.error(e); toast(failMsg||"저장 실패 — 네트워크 확인 후 다시 시도해주세요"); return false; } }
// 시트 + 뒤로가기 연동: 시트 열 때 history state push → 카톡/브라우저 뒤로가기 시 시트만 닫힘(웹뷰 이탈 방지)
// ===== 모바일 뒤로가기 =====
// 하위 상태(시트/현황/이름변경/메뉴관리)에 '들어갈 때만' history 항목 1개를 쌓는다.
// → 뒤로가기 한 번이면 그 하위 상태가 닫히고 주문화면으로. main(주문화면)에선 안 쌓으므로
//   뒤로가기가 평소처럼 앱 밖으로 나간다(갇히지 않음).
let sheetOpen=false, curView="main", subActive=false;
function pushSub(){ if(!subActive){ subActive=true; try{ history.pushState({sub:1},""); }catch(e){} } }
function openSheet(h){ $sheet.innerHTML='<div class="grip"></div>'+h; $scrim.classList.add("show"); sheetOpen=true; pushSub(); }
function closeSheet(){ $scrim.classList.remove("show"); sheetOpen=false; }  // history 항목은 다음 뒤로가기/열기가 소비·재사용
$scrim.addEventListener("click",e=>{ if(e.target===$scrim) closeSheet(); });
window.addEventListener("popstate",()=>{
  if(ignorePop){ ignorePop=false; return; }   // 버튼으로 확인창 닫을 때의 history.back() 무시
  if(confirmOpen){ confirmOpen=false; $cscrim.classList.remove("show"); const r=confirmResolve; confirmResolve=null; if(r) r(false); return; }  // 뒤로가기=확인창 취소(우선)
  subActive=false;   // 쌓아둔 하위 항목이 (뒤로가기로) 빠졌다
  if(sheetOpen){ $scrim.classList.remove("show"); sheetOpen=false; return; }  // 시트 닫기
  if(curView==="host"){ render(); return; }              // 현황 → 주문
  if(curView==="pick" && ME){ render(); return; }         // 이름변경 → 주문
  if(curView==="adminmenu"){ renderAdminDash(); return; } // 메뉴관리 → 관리자
  // main/랜딩/초기 이름선택: 더 빠질 항목 없음 → 브라우저가 그대로 앱 밖으로
});

/* ===================== 렌더 ===================== */
function render(){
  if(!ME || !memberById(ME)){ curView="pick"; renderPickMe(); $bottom.innerHTML=""; return; }
  curView="main"; renderHeader();
  if(SESSION.state==="idle") renderIdle();
  else if(SESSION.state==="open") renderOpen();
  else renderClosed();
  renderBottom();
}
function view(){ return document.getElementById("view"); }

function renderHeader(){
  const connHtml = SHARED ? `<span class="dot on"></span>공유중 · <span id="syncAgo">${syncAgoText()}</span> <span class="reload" id="refreshBtn" role="button" aria-label="새로고침" title="새로고침">↻</span>` : `<span class="dot off"></span>이 기기 전용`;
  $app.innerHTML = `
    <header><div class="h-row">
      <div><div class="room-name">☕ ${esc(ROOM_NAME)}</div>
        <div class="date">${prettyDate()} · ${connHtml}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="me-chip" id="meChip" role="button" aria-label="내 이름 변경">${esc(meName())} <small>· 변경</small></div>
        <button class="nav-link" id="gear" style="font-size:18px" aria-label="설정">⚙️</button>
      </div>
    </div></header>
    <div id="view"></div>`;
  document.getElementById("meChip").onclick=renderPickMe;
  document.getElementById("gear").onclick=()=>openSettings();
  const rb=document.getElementById("refreshBtn");
  if(rb) rb.onclick=async()=>{ rb.style.opacity=".35"; let ok=true;
    try{ await Sync.reload(); }catch(e){ ok=false; }
    if(curView==="host") renderHostView(); else render();
    toast(ok?"최신 상태로 업데이트했어요":"새로고침 실패 — 네트워크 확인"); };
}

function renderPickMe(){
  if(ME && curView!=="pick") pushSub();   // '이름 변경'으로 들어올 때만(초기 선택은 root)
  curView="pick";
  $bottom.innerHTML=""; // 이전 화면의 하단바 제거 (확인 바와 중복 방지)
  const list = MEMBERS.map(m=>{
    const o=ORDERS[m.id]; let badge="";
    if(o&&o.type==="drink") badge='<span class="pill ordered">주문함</span>';
    else if(o&&o.type==="skip") badge='<span class="pill skip">안마심</span>';
    if(m.id===pickSel) badge='<span class="pill" style="background:var(--brand);color:#fff">✓ 선택됨</span>';
    else if(m.id===ME && !badge) badge='<span class="pill ordered">나</span>';
    const top=H_topName[m.id]&&H_topName[m.id].name;
    return `<div class="person${m.id===pickSel?' picksel':''}" data-id="${esc(m.id)}" style="cursor:pointer">
      <div class="avatar">${esc(initials(m.name))}</div>
      <div style="min-width:0"><div class="pname">${esc(m.name)}</div>${top?`<div class="pmenu">최애메뉴: ${esc(top)}</div>`:''}</div>${badge}</div>`;
  }).join("");
  const sel = pickSel && memberById(pickSel);
  const selOrder = sel && ORDERS[pickSel];
  $app.innerHTML = `
    <header><div class="room-name" style="padding-top:6px">☕ ${esc(ROOM_NAME)}</div>
    <div class="date">먼저 <b>본인</b>을 선택해 주세요 (ㄱㄴㄷ순)</div></header>
    <div class="card" style="padding:8px 18px">${list}</div>
    <p class="muted center" style="margin:8px 0 4px">이름을 누르면 아래에서 <b>한 번 더 확인</b>해요.</p>
    <div class="label">내 이름이 목록에 없나요?</div>
    <div style="display:flex;gap:8px"><input type="text" id="addMeName" maxlength="40" placeholder="이름 입력" style="flex:1;min-width:0"/><button class="btn btn-soft btn-sm" id="addMeBtn" style="flex:none">추가하고 시작</button></div>`;
  $app.querySelectorAll(".person").forEach(el=> el.onclick=()=>{ pickSel=el.dataset.id; renderPickMe(); });
  document.getElementById("addMeBtn").onclick=async()=>{
    const nm=document.getElementById("addMeName").value.trim().slice(0,40); if(!nm){ toast("이름을 입력해주세요"); return; }
    if(MEMBERS.some(m=>m.id===nm)){ pickSel=nm; renderPickMe(); toast("이미 있는 이름이라 선택했어요"); return; }
    const arr=[...MEMBERS.map(m=>m.name), nm];
    if(await saveMembers(arr)){ setMe(nm); toast(nm+"님, 반가워요 🙏"); render(); }
  };
  if(sel){
    const bar=document.createElement("div"); bar.className="bottombar";
    bar.innerHTML=`<div class="inner" style="flex-direction:column;gap:8px">
      ${selOrder?`<div class="banner-warn" style="margin:0;text-align:center">⚠️ '${esc(sel.name)}'님은 이미 ${selOrder.type==="skip"?"'안 마심'":"주문"}이 있어요. 본인이 맞는지 꼭 확인!</div>`:''}
      <button class="btn btn-brand" id="confirmMe">🙋 '${esc(sel.name)}' 님으로 시작하기</button></div>`;
    $app.appendChild(bar);
    document.getElementById("confirmMe").onclick=()=>{ const id=pickSel; pickSel=null; setMe(id); toast(memberById(id).name+"님으로 시작할게요"); render(); };
  }
}

    <div class="card banner"><div class="emoji">🫧</div>
      <h2>오늘은 아직<br>섬기기로 하신 분이 없어요</h2>
      <p>오늘 음료로 섬겨주실 분은 아래 버튼을 눌러주세요</p></div>
    <p class="muted center">버튼을 누르면 <b>${esc(meName())}</b>님이 오늘 섬기는 분으로 확정되고,<br>셀원들에게 주문이 열립니다.</p>`;
}

let forceGrid=false;
let pickSel=null; // 본인선택 화면에서 임시로 고른 이름 (확인 전)
function renderOpen(){
  const host=memberById(SESSION.hostId), myOrder=ORDERS[ME];
  let myStatus="";
  if(myOrder && myOrder.type==="skip"){
    myStatus=`<div class="card center"><b>오늘은 안 마시기로 했어요</b> 🙅</div>`;
  } else if(myOrder){
    const d=orderDisplay(myOrder);
    myStatus=`<div class="card row-between"><div><div class="muted">내 주문</div>
      <b style="font-size:16px">${esc(d.emoji+" "+d.name)} ${myOrder.temp?('· '+myOrder.temp):''}</b>
      ${(myOrder.extras&&myOrder.extras.length)?`<div class="pmenu">${esc(myOrder.extras.join(", "))}</div>`:''}
      ${myOrder.note?`<div class="pmenu">📝 ${esc(myOrder.note)}</div>`:''}</div>
      <button class="btn btn-sm btn-soft" id="editMine">수정</button></div>`;
  }
  const isSkip = myOrder && myOrder.type==="skip";
  const showGrid = !myOrder || isSkip || forceGrid;
  // 다른 분 주문 ("나도" 버튼)
  const others=MEMBERS.filter(m=>m.id!==ME && ORDERS[m.id] && ORDERS[m.id].type==="drink");
  let othersHtml="";
  if(others.length){
    othersHtml=`<div class="label">다른 분 주문 · [나도] 누르면 같은 걸로</div>
      <div class="card" style="padding:6px 14px">${others.map(m=>{ const o=ORDERS[m.id], d=orderDisplay(o);
        return `<div class="person"><div class="avatar">${esc(initials(m.name))}</div>
          <div><div class="pname">${esc(m.name)}</div><div class="pmenu">${esc(d.emoji+" "+d.name)}${o.temp?(' · '+o.temp):''}${(o.extras&&o.extras.length)?(' · '+esc(o.extras.join(", "))):''}</div></div>
          <button class="btn btn-sm btn-soft sameas" data-id="${esc(m.id)}">나도</button></div>`;}).join("")}</div>`;
  }
  const gridHtml = showGrid ? `
      <div class="label">${myOrder?'메뉴 다시 고르기':'메뉴 선택'}</div>
      <div class="grid" id="menuGrid">${gridTilesHtml()}</div>
      ${ isSkip ? "" : `<div style="height:8px"></div><button class="btn btn-ghost" id="skipBtn">오늘은 안 마실게요 🙅</button>` }` : "";
  const changeLink = (myOrder && myOrder.type==="drink" && !forceGrid)
    ? `<p class="center" style="margin:2px 0 0"><span class="nav-link" id="changeMenu">다른 메뉴로 바꾸기 / 안 마시기</span></p>` : "";

  view().innerHTML=`
    <div class="card banner" style="padding:18px"><div class="emoji">🎉</div>
      <h2><span class="host-name">${esc(host?host.name:"?")}</span>님이 섬깁니다!</h2>
      <p>${myOrder?'메뉴 잘 전했어요 🙏':'드시고 싶은 메뉴를 골라주세요'}</p></div>
    ${myStatus}${changeLink}${gridHtml}${othersHtml}`;

  const grid=document.getElementById("menuGrid");
  if(grid) grid.querySelectorAll(".menu-tile").forEach(t=>{ if(t.dataset.full) t.onclick=()=>openFullMenuSheet(); else if(t.dataset.custom) t.onclick=()=>openCustomSheet(null); else t.onclick=()=>openOrderSheet(t.dataset.id,null); });
  const sk=document.getElementById("skipBtn"); if(sk) sk.onclick=async()=>{ forceGrid=false; if(await safeWrite(Sync.setOrder(ME,{type:"skip"}))){ toast("오늘은 쉬어가기로 했어요 🙆"); render(); } };
  const em=document.getElementById("editMine"); if(em) em.onclick=()=>openOrderSheet(myOrder.menuId,myOrder);
  const cm=document.getElementById("changeMenu"); if(cm) cm.onclick=()=>{ forceGrid=true; renderOpen(); };
  view().querySelectorAll(".sameas").forEach(b=> b.onclick=async()=>{ const src=ORDERS[b.dataset.id];
    const o={type:"drink",menuId:src.menuId,menuName:src.menuName||orderDisplay(src).name,temp:src.temp,extras:[...(src.extras||[])],note:""};
    forceGrid=false; if(await safeWrite(Sync.setOrder(ME,o))){ bumpFreq(o.menuId); toast(memberById(b.dataset.id).name+"님과 같은 메뉴로 담았어요"); render(); } });
}

function openOrderSheet(menuId, existing){
  let temp = existing&&existing.temp ? existing.temp : null;
  let extras = existing&&existing.extras ? [...existing.extras] : [];
  let note = existing&&existing.note ? existing.note : "";
  function draw(){
    const m = anyMenuById(menuId) || { id:menuId, name:(existing&&existing.menuName)||"?", emoji:"🥤", temps:["ICE","HOT"], extras:[] };
    if(m.temps.length){ if(!temp || !m.temps.includes(temp)) temp = m.temps[0]; } else { temp = null; }
    const caf = ["coffee","latte","coldbrew","handdrip"].includes(m.cat); // 커피 기반 = 디카페인 가능
    const availExtras = (caf?["디카페인"]:[]).concat(m.extras||[]);
    extras = extras.filter(x=>availExtras.includes(x));
    const tempHtml = m.temps.length>1
      ? `<div class="seg-temp" id="temps">${m.temps.map(t=>`<button class="tbtn ${t==='ICE'?'ice':'hot'} ${t===temp?'on':''}" data-t="${t}">${t==='ICE'?'🧊 ICE':'🔥 HOT'}</button>`).join("")}</div>`
      : m.temps.length===1
      ? `<div class="seg-temp"><button class="tbtn ${m.temps[0]==='ICE'?'ice on':'hot on'}" disabled>${m.temps[0]==='ICE'?'🧊 ICE 전용':'🔥 HOT 전용'}</button></div>`
      : "";
    openSheet(`
      <h3>${esc(m.emoji)} ${esc(m.name)}</h3>
      <p class="muted" style="margin-top:0">다른 메뉴로 바꾸려면 아래에서 다시 선택</p>
      <div class="grid">${gridTilesHtml(menuId)}</div>
      ${tempHtml?`<div class="label">온도</div>${tempHtml}`:""}
      ${availExtras.length?`<div class="label">옵션 (여러 개 가능)</div><div class="chips" id="extras">${availExtras.map(x=>`<div class="chip ${extras.includes(x)?'sel':''}" data-x="${esc(x)}">${esc(x)}</div>`).join("")}</div>`:""}
      <div class="label">메모 (선택)</div><input type="text" id="note" maxlength="200" placeholder="예: 얼음 적게" value="${esc(note)}" />
      <div style="height:18px"></div>
      <button class="btn btn-brand" id="confirmOrder">${existing?'주문 수정':'이걸로 주문'}</button>
      <div style="height:8px"></div>
      ${existing?'<button class="btn btn-danger" id="cancelOrder">주문 취소</button>':'<button class="btn btn-ghost" id="closeSheet">닫기</button>'}`);
    $sheet.querySelectorAll(".menu-tile").forEach(t=>{ if(t.dataset.full){ t.onclick=()=>openFullMenuSheet(); } else if(t.dataset.custom){ t.onclick=()=>openCustomSheet(existing); } else { t.onclick=()=>{ note=document.getElementById("note").value; menuId=t.dataset.id; temp=null; extras=[]; draw(); }; }});
    const tp=document.getElementById("temps"); if(tp) tp.querySelectorAll(".tbtn").forEach(b=>{ if(!b.disabled) b.onclick=()=>{ temp=b.dataset.t; note=document.getElementById("note").value; draw(); }; });
    const ex=document.getElementById("extras"); if(ex) ex.querySelectorAll(".chip").forEach(c=> c.onclick=()=>{ const v=c.dataset.x,i=extras.indexOf(v); i>=0?extras.splice(i,1):extras.push(v); note=document.getElementById("note").value; draw(); });
    document.getElementById("confirmOrder").onclick=async()=>{ note=document.getElementById("note").value.trim(); forceGrid=false;
      if(await safeWrite(Sync.setOrder(ME,{type:"drink",menuId,menuName:m.name,temp,extras,note}))){ bumpFreq(menuId); closeSheet(); toast(existing?"주문을 바꿨어요":"주문 담았어요 🙏"); render(); } };
    const cs=document.getElementById("closeSheet"); if(cs) cs.onclick=closeSheet;
    const co=document.getElementById("cancelOrder"); if(co) co.onclick=async()=>{ forceGrid=false; if(await safeWrite(Sync.removeOrder(ME))){ closeSheet(); toast("주문을 취소했어요"); render(); } };
  }
  draw();
}

function openCustomSheet(existing){
  let temp="ICE";
  openSheet(`
    <h3>🥤 직접 입력</h3>
    <p class="muted" style="margin-top:0">목록에 없는 메뉴를 추가해요. 추가하면 다른 분에게도 보입니다.</p>
    <div class="label">메뉴 이름</div>
    <input type="text" id="cname" maxlength="60" placeholder="예: 흑임자라떼" />
    <div class="label">온도</div>
    <div class="seg-temp" id="ctemp">
      <button class="tbtn ice on" data-t="ICE">🧊 ICE</button>
      <button class="tbtn hot" data-t="HOT">🔥 HOT</button>
    </div>
    <div class="label">메모 (선택)</div><input type="text" id="cnote" maxlength="200" placeholder="예: 덜 달게" />
    <div style="height:18px"></div>
    <button class="btn btn-brand" id="cAdd">추가하고 주문</button>
    <div style="height:8px"></div><button class="btn btn-ghost" id="cClose">닫기</button>`);
  document.getElementById("ctemp").querySelectorAll(".tbtn").forEach(b=> b.onclick=()=>{ temp=b.dataset.t;
    document.getElementById("ctemp").querySelectorAll(".tbtn").forEach(x=>x.classList.toggle("on", x.dataset.t===temp)); });
  document.getElementById("cAdd").onclick=async()=>{ const name=document.getElementById("cname").value.trim(), note=document.getElementById("cnote").value.trim();
    if(!name){ toast("메뉴 이름을 입력해주세요"); return; }
    forceGrid=false;
    if(!(await safeWrite(Sync.setOrder(ME,{type:"drink",menuId:"c:"+name,menuName:name,temp,extras:[],note})))) return;
    bumpFreq("c:"+name);
    // 직접입력 메뉴는 이 셀 주문(menu_name)으로만 저장 — 그날 이 셀 그리드에 표시(customMenusFromOrders).
    // (공유 카페로의 자동 승격은 익명 오염 방지를 위해 제거; 카페 공식 메뉴 추가는 관리자만)
    closeSheet(); toast("추가해서 담았어요 🙏"); render(); };
  document.getElementById("cClose").onclick=closeSheet;
  setTimeout(()=>{ const el=document.getElementById("cname"); if(el) el.focus(); },60);
}

function openFullMenuSheet(){
  // 목록을 '한 번만' 그리고, 검색은 보이기/숨기기 토글만 → 덜컹임 없음
  const listHtml = CATEGORIES.map(c=>{
    const items=MENUS.filter(m=>m.cat===c.id);
    if(!items.length) return "";
    return `<div class="mcat"><div class="label" style="margin-top:14px">${c.label}</div><div class="card" style="padding:4px 14px">`+
      items.map(m=>`<div class="person menu-row" data-id="${esc(m.id)}" data-name="${esc(m.name.toLowerCase())}" style="cursor:pointer">
        <div style="font-size:21px;width:30px;text-align:center">${esc(m.emoji)}</div>
        <div class="pname">${esc(m.name)}</div>
        <span class="pmenu" style="margin-left:auto">${m.temps.length?m.temps.join("/"):"·"}</span></div>`).join("")+`</div></div>`;
  }).join("");
  openSheet(`
    <div style="position:sticky;top:0;background:var(--bg);z-index:5;padding:2px 0 10px">
      <h3 style="margin:0 0 8px">📋 전체 메뉴판</h3>
      <input type="text" id="mq" placeholder="🔍 메뉴 검색 (예: 자몽, 라떼, 콜드브루)" />
    </div>
    <div id="mResults">${listHtml}<p class="muted center" id="mEmpty" style="margin-top:24px;display:none">검색 결과가 없어요</p></div>
    <div style="height:14px"></div>
    <button class="btn btn-soft" id="freeInput">목록에 없어요 — 직접 입력</button>
    <div style="height:8px"></div><button class="btn btn-ghost" id="mClose">닫기</button>`);
  const mq=document.getElementById("mq"), results=document.getElementById("mResults"), empty=document.getElementById("mEmpty");
  function applyFilter(){
    const ql=mq.value.trim().toLowerCase(); let any=false;
    results.querySelectorAll(".mcat").forEach(cat=>{
      let catVisible=false;
      cat.querySelectorAll(".menu-row").forEach(r=>{ const hit=!ql||r.dataset.name.includes(ql); r.style.display=hit?"":"none"; if(hit) catVisible=true; });
      cat.style.display=catVisible?"":"none"; if(catVisible) any=true;
    });
    empty.style.display=any?"none":"";
  }
  mq.addEventListener("input", applyFilter);
  // 클릭은 이벤트 위임 (재바인딩 없음)
  results.addEventListener("click", e=>{ const r=e.target.closest(".menu-row"); if(r) openOrderSheet(r.dataset.id,null); });
  document.getElementById("freeInput").onclick=()=>openCustomSheet(null);
  document.getElementById("mClose").onclick=closeSheet;
  setTimeout(()=>{ try{ mq.focus(); }catch(e){} },60);
}

/* ---------- 대시보드 ---------- */
let dashTab="people";
function dashboardHtml(){
  const drinks=countDrinks();
  const ordered=MEMBERS.filter(m=>ORDERS[m.id]&&ORDERS[m.id].type==="drink");
  const skipped=MEMBERS.filter(m=>ORDERS[m.id]&&ORDERS[m.id].type==="skip");
  const pending=MEMBERS.filter(m=>!ORDERS[m.id]);
  const stats=`<div class="stats">
    <div class="stat total"><div class="num">${drinks}</div><div class="lbl">총 잔수</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${ordered.length}</div><div class="lbl">주문</div></div>
    <div class="stat"><div class="num" style="color:var(--gray)">${skipped.length}</div><div class="lbl">안마심</div></div>
    <div class="stat"><div class="num" style="color:var(--accent)">${pending.length}</div><div class="lbl">미응답</div></div></div>`;
  const tabs=`<div class="tabs" id="dashTabs">
    <div class="tab ${dashTab==='people'?'on':''}" data-t="people">셀원별 / 전달하기</div>
    <div class="tab ${dashTab==='cafe'?'on':''}" data-t="cafe">카페 주문서</div></div>`;
  let body;
  if(dashTab==="people"){
    const row=(m,kind)=>{ const o=ORDERS[m.id]; let menu="",pill="";
      if(kind==="ordered"){ const d=orderDisplay(o);
        menu=`${esc(d.emoji+" "+d.name)}${o.temp?(' · '+o.temp):''}${(o.extras&&o.extras.length)?(' · '+esc(o.extras.join(", "))):''}${o.note?(' · 📝'+esc(o.note)):''}`;
        pill=`<span class="pill ordered">주문</span>`; }
      else if(kind==="skip"){ menu="오늘은 안 마심"; pill=`<span class="pill skip">안마심</span>`; }
      else { menu="아직 응답 없음"; pill=`<span class="pill pending">미응답</span>`; }
      return `<div class="person"><div class="avatar" style="${kind==='pending'?'background:var(--gray)':kind==='skip'?'background:#cbbfae':''}">${esc(initials(m.name))}</div>
        <div><div class="pname">${esc(m.name)}</div><div class="pmenu">${menu}</div></div>${pill}</div>`; };
    body=`<div class="card" style="padding:6px 18px">${ordered.map(m=>row(m,"ordered")).join("")}${skipped.map(m=>row(m,"skip")).join("")}${pending.map(m=>row(m,"pending")).join("")}</div>`;
    if(pending.length && SESSION.state==="open") body+=`<button class="btn btn-soft" id="nudge">📢 미응답 ${pending.length}명 안내 문구 복사</button>`;
  } else {
    body=`<div class="card"><div class="muted" style="margin-bottom:10px">카페에 그대로 보여주거나 복사하세요 (이름 없이 수량만)</div>
      <div class="order-box" id="orderBox">${esc(cafeText())}</div><div style="height:12px"></div>
      <button class="btn btn-brand" id="copyCafe">📋 주문서 복사</button></div>`;
  }
  return stats+tabs+body;
}
function wireDashboard(){
  const t=document.getElementById("dashTabs"); if(t) t.querySelectorAll(".tab").forEach(el=> el.onclick=()=>{ dashTab=el.dataset.t; rerenderDash(); });
  const cp=document.getElementById("copyCafe"); if(cp) cp.onclick=()=>copyText(cafeText(),"주문서를 복사했어요");
  const nd=document.getElementById("nudge"); if(nd) nd.onclick=()=>{ const names=MEMBERS.filter(m=>!ORDERS[m.id]).map(m=>m.name).join(", ");
    const h=memberById(SESSION.hostId); const hostClause=h?`${h.name}님이 `:"";   // host가 셀원에서 빠져도 안전
    copyText(`☕ 아직 메뉴 안 고르신 분: ${names}\n${hostClause}오늘 음료로 섬기십니다. 링크에서 골라주세요!`,"안내 문구 복사됨"); };
}
function rerenderDash(){ if(SESSION.state==="closed") renderClosed(); else renderHostView(); }
function countDrinks(){ return MEMBERS.filter(m=>ORDERS[m.id]&&ORDERS[m.id].type==="drink").length; }
function cafeText(){
  const map={};
  MEMBERS.forEach(m=>{ const o=ORDERS[m.id]; if(!o||o.type!=="drink") return; const nm=orderDisplay(o).name;
    const k=nm+(o.temp?` (${o.temp})`:"")+(o.extras&&o.extras.length?` [${o.extras.join("/")}]`:""); map[k]=(map[k]||0)+1; });
  const lines=Object.keys(map).sort((a,b)=>a.localeCompare(b,"ko")).map(k=>`${k}  x${map[k]}`); const total=countDrinks();
  if(!total) return "아직 주문이 없습니다.";
  return lines.join("\n")+`\n────────────\n합계  ${total}잔`;
}

function copyText(text,msg){ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(()=>toast(msg)).catch(()=>fb(text,msg)); else fb(text,msg);
  function fb(t,m){ try{ const ta=document.createElement("textarea"); ta.value=t; ta.style.cssText="position:fixed;top:0;left:0;opacity:0"; document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,t.length); const ok=document.execCommand("copy"); document.body.removeChild(ta); if(ok){ toast(m); return; } }catch(e){}
    // 카톡 등 인앱 브라우저 폴백: 길게 눌러 복사
    try{ prompt("복사가 안 되면 아래를 길게 눌러 복사하세요", t); }catch(e){ toast("복사 실패"); } } }

async function fetchCell(id){
  if(SHARED){
    try{ const {data,error}=await Sync.client.rpc("get_cell",{p_id:id});
      const row=Array.isArray(data)?data[0]:data;
      if(error||!row) return null;
      const cell={id:row.id,roomId:row.room_id,name:row.name,members:Array.isArray(row.members)?row.members:[],homeCafeId:row.home_cafe||"gil"};
      DB_CELLS[id]=cell; rememberCell(cell); return cell;
    }catch(e){ return null; }
  }
  return DB_CELLS[id] || CODE_CELLS[id] || null; // 로컬모드 폴백
}

function slugify(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,20); }
function rand36(n){ let s=""; while(s.length<n) s+=Math.random().toString(36).slice(2); return s.slice(0,n); }
function genCellId(name){ let base=slugify(name); if(base.length<2) base="cell"; let id; do{ id=base+"-"+rand36(14); }while(cellById(id)); return id; } // 유추 불가 랜덤

// 관리자: 셀 이름·셀원 수정 (authenticated 직접 update — cells_admin_update 정책)
function openEditCellSheet(cell){
  let cafeId = cell.homeCafeId || "gil";
  openSheet(`
    <h3>✏️ '${esc(cell.name)}' 셀 수정</h3>
    <div class="label">셀 이름</div>
    <input type="text" id="ecName" maxlength="40" value="${esc(cell.name)}" />
    <div class="label">셀원 (쉼표 또는 줄바꿈으로 구분)</div>
    <textarea id="ecMembers" rows="6" style="width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink)">${esc((cell.members||[]).join("\n"))}</textarea>
    <div class="label">홈 카페 (기본 카페)</div>
    <div class="chips" id="ecCafe">${CAFE_LIST.map(c=>`<div class="chip ${c.id===cafeId?'sel':''}" data-c="${c.id}">${c.emoji} ${esc(c.name)}</div>`).join("")}</div>
    <p class="muted" style="margin-top:10px">초대 링크(코드)는 그대로예요: <b>${esc(cell.id)}</b></p>
    <div style="height:14px"></div>
    <button class="btn btn-brand" id="ecSave">저장</button>
    <div style="height:8px"></div><button class="btn btn-ghost" id="ecClose">닫기</button>`);
  const chips=document.getElementById("ecCafe");
  chips.querySelectorAll(".chip").forEach(c=> c.onclick=()=>{ cafeId=c.dataset.c; chips.querySelectorAll(".chip").forEach(x=>x.classList.toggle("sel",x.dataset.c===cafeId)); });
  document.getElementById("ecClose").onclick=closeSheet;
  document.getElementById("ecSave").onclick=async()=>{
    const name=document.getElementById("ecName").value.trim();
    const members=[...new Set(document.getElementById("ecMembers").value.split(/[\n,]/).map(s=>s.trim().slice(0,40)).filter(Boolean))].slice(0,60);
    if(!name){ toast("셀 이름을 입력해주세요"); return; }
    if(members.length<1){ toast("셀원을 1명 이상 입력해주세요"); return; }
    if(!SHARED){ toast("운영(연결) 모드에서만 수정돼요"); return; }
    const {error}=await Sync.client.from("cells").update({name,members,home_cafe:cafeId}).eq("id",cell.id);
    if(error){ toast("저장 실패: "+(error.message||"")); return; }
    if(DB_CELLS[cell.id]){ DB_CELLS[cell.id].name=name; DB_CELLS[cell.id].members=members; DB_CELLS[cell.id].homeCafeId=cafeId; }
    closeSheet(); toast("셀을 수정했어요"); renderAdminDash();
  };
}

/* ===================== 관리자 페이지 (숨은 경로 ?admin) ===================== */
async function renderAdmin(){
  adminMode=true; curView="admin"; $bottom.innerHTML="";
  if(!SHARED){   // 운영은 키 내장으로 항상 SHARED — 로컬/미연결 시 안내만(키 붙여넣기 폼 없음)
    $app.innerHTML=`
      <header><div class="room-name" style="padding-top:6px">🔒 관리자</div>
      <div class="date">운영(Supabase 연결) 환경에서만 사용할 수 있어요</div></header>
      <div class="card"><p class="muted" style="margin:0;line-height:1.7">이 화면은 운영 배포(공유 모드)에서만 동작합니다.</p></div>
      <p class="muted center" style="margin-top:10px"><a href="${esc(location.pathname)}" style="color:var(--sub)">← 일반 화면으로</a></p>`;
    return;
  }
  try{ const { data:{ session } } = await Sync.client.auth.getSession();
    if(session) renderAdminDash(); else renderAdminLogin();
  }catch(e){ renderAdminLogin(); }
}
function renderAdminLogin(){
  curView="admin";
  $app.innerHTML=`
    <header><div class="room-name" style="padding-top:6px">🔒 관리자</div>
    <div class="date">로그인이 필요합니다</div></header>
    <div class="card">
      <div class="label">이메일</div><input type="email" id="admEmail" autocomplete="username" placeholder="admin@example.com" />
      <div class="label">비밀번호</div><input type="password" id="admPw" autocomplete="current-password" placeholder="비밀번호" />
      <div style="height:14px"></div>
      <button class="btn btn-brand" id="admLogin">로그인</button>
    </div>
    <p class="muted center" style="margin-top:10px"><a href="${esc(location.pathname)}" style="color:var(--sub)">← 일반 화면으로</a></p>`;
  document.getElementById("admLogin").onclick=async()=>{
    const email=document.getElementById("admEmail").value.trim(), password=document.getElementById("admPw").value;
    if(!email||!password){ toast("이메일과 비밀번호를 입력해주세요"); return; }
    const {error}=await Sync.client.auth.signInWithPassword({email,password});
    if(error){ toast("로그인 실패: "+(error.message||"")); return; }
    toast("로그인 완료"); renderAdminDash();
  };
}
async function renderAdminDash(){
  curView="admin";
  if(SHARED) await loadDbCells();
  const cells=Object.values(SHARED ? DB_CELLS : { ...CODE_CELLS, ...DB_CELLS });
  const rows=cells.map(c=>{ const url=`${location.origin}${location.pathname}?cell=${c.id}`;
    return `<div class="person" style="align-items:flex-start">
      <div class="avatar">${esc(initials(c.name))}</div>
      <div style="flex:1;min-width:0">
        <div class="pname">${esc(c.name)} ${c.builtin?'<span class="pill ordered">기본</span>':''}</div>
        <div class="pmenu">${(c.members||[]).length}명 · ${esc((CAFES[c.homeCafeId]||{}).name||"")} · 초대코드 <b>${esc(c.id)}</b></div>

          <button class="btn btn-soft btn-sm copylink" data-url="${esc(url)}">📋 링크</button>
          <button class="btn btn-soft btn-sm editcell" data-id="${esc(c.id)}">✏️ 수정</button>
          ${c.builtin?'':`<button class="btn btn-danger btn-sm delcell" data-id="${esc(c.id)}">삭제</button>`}
        </div>

  $app.innerHTML=`
    <header><div class="h-row">

    <button class="btn btn-soft" id="admMenu">🍽️ 카페 메뉴 관리 (카페길)</button>

  document.getElementById("admNew").onclick=()=>openCreateCellSheet();
  document.getElementById("admMenu").onclick=()=>openCafeMenuAdmin("gil");
  const lo=document.getElementById("admLogout"); if(lo) lo.onclick=async()=>{ await Sync.client.auth.signOut(); toast("로그아웃됨"); renderAdminLogin(); };
  $app.querySelectorAll(".copylink").forEach(b=> b.onclick=()=>copyText(b.dataset.url,"링크 복사됨"));

  $app.querySelectorAll(".delcell").forEach(b=> b.onclick=async()=>{ if(!(await askConfirm("이 셀을 삭제할까요?\n지난 주문 데이터는 남지만 링크 접근은 막힙니다.",{ok:"삭제",danger:true}))) return;

    delete DB_CELLS[b.dataset.id]; if(!SHARED) localStorage.setItem("coffee_local_cells",JSON.stringify(DB_CELLS));

}

// 카페 메뉴 관리 (관리자) — DB(cafe_menus) CRUD + 코드 76개 시드
async function openCafeMenuAdmin(cafeId){
  if(!SHARED){ toast("Supabase 연결 필요"); return; }
  if(curView!=="adminmenu") pushSub();
  curView="adminmenu";
  delete CAFEMENU_CACHE[cafeId]; const menus=await loadCafeMenus(cafeId);
  const sorted=menus.slice().sort((a,b)=>(a.sort-b.sort)||a.name.localeCompare(b.name,"ko"));
  const rows=sorted.map(m=>`<div class="person" data-id="${esc(m.id)}">
      <div style="font-size:20px;width:26px;text-align:center">${esc(m.emoji||"🥤")}</div>
      <div style="flex:1;min-width:0"><div class="pname">${esc(m.name)}</div><div class="pmenu">${esc(CAT_LABEL[m.cat]||m.cat||"기타")} · ${esc((m.temps||[]).join("/")||"-")}</div></div>
      <button class="btn btn-sm ${m.popular?'btn-brand':'btn-soft'} mpop" data-id="${esc(m.id)}" style="flex:none">${m.popular?'⭐인기':'인기'}</button>
      <button class="mdel2" data-id="${esc(m.id)}" style="background:none;border:none;color:var(--red);font-size:18px;flex:none;cursor:pointer">✕</button>
    </div>`).join("") || '<p class="muted">메뉴가 없어요. 아래 "기본 메뉴 불러오기"로 시작하세요.</p>';
  $app.innerHTML=`
    <header><div class="h-row"><div><div class="room-name">🍽️ 카페길 메뉴</div><div class="date">${menus.length}개 · 관리자</div></div>
      <button class="nav-link" id="mback" style="font-size:14px">← 관리자</button></div></header>
    ${menus.length?'':'<button class="btn btn-brand" id="seed">📥 기본 메뉴 76개 불러오기(시드)</button><div style="height:10px"></div>'}
    <button class="btn btn-soft" id="addMenu">➕ 메뉴 추가</button>
    ${menus.length?'<div style="height:6px"></div><button class="btn btn-ghost" id="reseed" style="font-size:13px">기본 메뉴 다시 덮어쓰기</button>':''}
    <div style="height:12px"></div>
    <div class="card" style="padding:6px 16px">${rows}</div>`;
  document.getElementById("mback").onclick=()=>{ if(subActive) history.back(); else renderAdminDash(); };
  const seedBtn=document.getElementById("seed")||document.getElementById("reseed");
  if(seedBtn) seedBtn.onclick=async()=>{ if(seedBtn.id==="reseed"&&!(await askConfirm("코드 기본 76개 메뉴로 덮어쓸까요?\n(같은 메뉴는 갱신됩니다)",{ok:"덮어쓰기",danger:true}))) return;
    const payload=GIL_MENUS.map((m,i)=>({cafe_id:cafeId,menu_id:m.id,name:m.name,emoji:m.emoji,cat:m.cat,temps:m.temps,extras:m.extras,popular:!!m.popular,sort:i}));
    const {error}=await Sync.client.from("cafe_menus").upsert(payload,{onConflict:"cafe_id,menu_id"});
    if(error){ toast("시드 실패: "+(error.message||"")); return; } delete CAFEMENU_CACHE[cafeId]; toast("기본 메뉴 등록됨"); openCafeMenuAdmin(cafeId); };
  document.getElementById("addMenu").onclick=()=>openMenuEditSheet(cafeId,null);
  $app.querySelectorAll(".mpop").forEach(b=> b.onclick=async()=>{ const m=menus.find(x=>x.id===b.dataset.id);
    const {error}=await Sync.client.from("cafe_menus").update({popular:!m.popular}).eq("cafe_id",cafeId).eq("menu_id",b.dataset.id);
    if(error){ toast("실패: "+error.message); return; } delete CAFEMENU_CACHE[cafeId]; openCafeMenuAdmin(cafeId); });
  $app.querySelectorAll(".mdel2").forEach(b=> b.onclick=async()=>{ if(!(await askConfirm("이 메뉴를 삭제할까요?",{ok:"삭제",danger:true}))) return;
    const {error}=await Sync.client.from("cafe_menus").delete().eq("cafe_id",cafeId).eq("menu_id",b.dataset.id);
    if(error){ toast("삭제 실패: "+error.message); return; } delete CAFEMENU_CACHE[cafeId]; toast("삭제됨"); openCafeMenuAdmin(cafeId); });
}
function openMenuEditSheet(cafeId, existing){
  let temps = existing? [...(existing.temps||["ICE","HOT"])] : ["ICE","HOT"];
  let cat = existing? (existing.cat||"coffee") : "coffee";
  function tchip(t){ return `<div class="chip ${temps.includes(t)?'sel':''}" data-t="${t}">${t}</div>`; }
  openSheet(`
    <h3>${existing?'메뉴 수정':'메뉴 추가'}</h3>
    <div class="label">이름</div><input type="text" id="mname" maxlength="40" value="${esc(existing?existing.name:'')}" placeholder="예: 흑임자라떼"/>
    <div class="label">이모지(선택)</div><input type="text" id="memoji" maxlength="4" value="${esc(existing?(existing.emoji||''):'')}" placeholder="🥤"/>
    <div class="label">분류</div>
    <select id="mcat" style="width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:#fff">${CAT_ORDER.map(c=>`<option value="${c}" ${c===cat?'selected':''}>${CAT_LABEL[c]}</option>`).join("")}</select>
    <div class="label">온도</div><div class="chips" id="mtemps">${tchip("ICE")}${tchip("HOT")}</div>
    <div style="height:14px"></div>
    <button class="btn btn-brand" id="msave">${existing?'수정':'추가'}</button>
    <div style="height:8px"></div><button class="btn btn-ghost" id="mcancel">닫기</button>`);
  document.getElementById("mtemps").querySelectorAll(".chip").forEach(c=> c.onclick=()=>{ const t=c.dataset.t,i=temps.indexOf(t); i>=0?temps.splice(i,1):temps.push(t); c.classList.toggle("sel"); });
  document.getElementById("mcancel").onclick=closeSheet;
  document.getElementById("msave").onclick=async()=>{
    const name=document.getElementById("mname").value.trim().slice(0,40); if(!name){ toast("이름을 입력해주세요"); return; }
    const emoji=document.getElementById("memoji").value.trim().slice(0,4)||"🥤"; cat=document.getElementById("mcat").value;
    const id=existing?existing.id:("m:"+name);
    const {error}=await Sync.client.from("cafe_menus").upsert({cafe_id:cafeId,menu_id:id,name,emoji,cat,temps,extras:existing?existing.extras:[],popular:existing?!!existing.popular:false},{onConflict:"cafe_id,menu_id"});
    if(error){ toast("저장 실패: "+error.message); return; } delete CAFEMENU_CACHE[cafeId]; closeSheet(); toast("저장됨"); openCafeMenuAdmin(cafeId); };
}

// 셀원 편집 (이 셀 링크를 가진 누구나) — set_members RPC
function openMembersSheet(){
  let list=[...MEMBERS.map(m=>m.name)];
  function draw(){
    openSheet(`
      <h3>👥 ${esc(ROOM_NAME)} 셀원 편집</h3>
      <p class="muted" style="margin-top:0">이 셀 링크를 가진 누구나 편집할 수 있어요. 저장하면 모두에게 반영됩니다.</p>
      <div class="card" style="padding:6px 14px" id="mlist">${list.length?list.map((n,i)=>`<div class="person"><div class="avatar">${esc(initials(n))}</div><input type="text" class="medit" data-i="${i}" value="${esc(n)}" maxlength="40" style="flex:1;border:none;background:transparent;font-size:16px;font-weight:600;color:var(--ink)" /><button class="mdel" data-i="${i}" style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;flex:none">✕</button></div>`).join(""):'<p class="muted">셀원이 없어요</p>'}</div>
      <div style="display:flex;gap:8px;margin-top:10px"><input type="text" id="newM" maxlength="40" placeholder="셀원 이름 추가" style="flex:1"/><button class="btn btn-soft btn-sm" id="addM" style="flex:none">추가</button></div>
      <div style="height:14px"></div>
      <button class="btn btn-brand" id="saveM">저장</button>
      <div style="height:8px"></div><button class="btn btn-ghost" id="closeM">닫기</button>`);
    $sheet.querySelectorAll(".medit").forEach(inp=> inp.oninput=()=>{ list[+inp.dataset.i]=inp.value; });
    $sheet.querySelectorAll(".mdel").forEach(b=> b.onclick=()=>{ list.splice(+b.dataset.i,1); draw(); });
    document.getElementById("addM").onclick=()=>{ const el=document.getElementById("newM"), v=el.value.trim(); if(v){ list.push(v); draw(); } };
    document.getElementById("saveM").onclick=async()=>{
      const cleaned=[...new Set(list.map(s=>(s||"").trim().slice(0,40)).filter(Boolean))].slice(0,60);
      if(!cleaned.length){ toast("셀원을 1명 이상 두세요"); return; }
      if(await saveMembers(cleaned)){ if(ME && !cleaned.includes(ME)) setMe(null); closeSheet(); toast("셀원 명단을 저장했어요"); render(); }
    };
    document.getElementById("closeM").onclick=closeSheet;
  }
  draw();
}

/* ===================== 부팅 ===================== */
// 스케일 완화: 백그라운드 탭은 실시간 구독 해제, 복귀 시 재구독+새로고침 (동시접속 절감)
document.addEventListener("visibilitychange", async ()=>{
  if(!SHARED || !CELL || adminMode || inPicker) return;
  if(document.hidden){ if(Sync.pause) Sync.pause(); }
  else { try{ await Sync.resubscribe(); }catch(e){} render(); }
});
function onRemote(){ if(inPicker || adminMode) return; if(curView==="host") renderHostView(); else render(); }
(async function boot(){
  console.log("[오늘은 제가 섬기겠습니다] build "+APP_VERSION);  // 캐시/배포 확인용
  // 무한 로딩 방지: 8초 내 첫 렌더 안 되면 재시도 안내
  setTimeout(()=>{ if(document.querySelector("#app > .loading")) $app.innerHTML='<div class="loading">연결이 지연되고 있어요 📡<br><br><button class="btn btn-soft" onclick="location.reload()" style="max-width:200px;margin:0 auto">다시 시도</button></div>'; }, 8000);
  try { await Sync.init(onRemote); }
  catch(e){ console.error(e); $app.innerHTML=`<div class="loading">연결 오류: ${esc(e.message||"")}<br>설정을 확인해주세요.</div>`; return; }
  if(!SHARED) loadLocalCells();   // 일반 사용자는 전체 셀 열거 안 함(자기 셀만 단건 조회)
  const params=new URLSearchParams(location.search);
  try {
    if(params.has("admin")){ await renderAdmin(); }   // 숨은 관리자 경로(전체 셀은 여기서만)
    else { const target=params.get("cell"); // 바 URL은 최근 셀 자동입장 안 함 — 랜딩만
      if(target) await enterCell(target);   // ?cell= 링크만 단건 입장
      else renderCellPicker(); }            // 바 URL → 개발자 메시지/앱 안내 랜딩
  } catch(e){ console.error("초기 렌더 실패",e); }
})();
</script>
